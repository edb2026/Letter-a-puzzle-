<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>ABC Animals</title>
<meta name="theme-color" content="#bcd6e6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ABC Animals">
<style>
  :root{ --cream:#fff6ea; --ink:#3a2a55; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; height:100%; width:100%;
    overflow:hidden; position:fixed; inset:0;
    background:
      radial-gradient(circle at 18% 12%, #ffe6c2 0%, rgba(255,230,194,0) 42%),
      radial-gradient(circle at 88% 22%, #d9e6ff 0%, rgba(217,230,255,0) 46%),
      radial-gradient(circle at 50% 100%, #ffd9f0 0%, rgba(255,217,240,0) 55%),
      var(--cream);
    font-family:"Chalkboard SE","Marker Felt","Comic Sans MS",system-ui,sans-serif;
    color:var(--ink);
    touch-action:none; user-select:none; -webkit-user-select:none;
  }
  .bg-dot{ position:absolute; border-radius:50%; opacity:.35; filter:blur(.5px); pointer-events:none; }
  #stage{ position:fixed; inset:0; touch-action:none; }

  #hint{
    position:absolute; top:max(14px,env(safe-area-inset-top)); left:16px;
    display:flex; align-items:center; gap:10px;
    background:#ffffffcc; backdrop-filter:blur(4px);
    border:3px solid #fff; border-radius:22px; padding:8px 14px 8px 10px;
    box-shadow:0 8px 20px rgba(90,60,140,.18); z-index:50; pointer-events:none;
  }
  #hint svg{ width:46px; height:58px; display:block; }
  #hint .txt{ font-size:15px; line-height:1.05; }
  #hint .txt b{ font-size:22px; }

  #reset{
    position:absolute; top:max(14px,env(safe-area-inset-top)); right:16px; z-index:50;
    cursor:pointer; background:#fff; border:3px solid #ffd27a; color:var(--ink);
    font-family:inherit; font-size:18px; padding:10px 16px; border-radius:20px;
    box-shadow:0 8px 18px rgba(90,60,140,.18);
  }
  #reset:active{ transform:scale(.94); }

  #target{ position:absolute; pointer-events:none; z-index:1; opacity:.5; }
  #target svg{ display:block; }

  .piece{
    position:absolute; left:0; top:0; z-index:10; will-change:transform;
    filter:drop-shadow(0 6px 10px rgba(70,30,110,.28)); transition:transform .05s linear;
  }
  .piece svg{ display:block; pointer-events:none; overflow:visible; }
  .piece path{ pointer-events:auto; cursor:grab; }
  .piece.dragging{ z-index:100; transition:none; filter:drop-shadow(0 14px 18px rgba(70,30,110,.35)); }
  .piece.dragging path{ cursor:grabbing; }
  .piece.locked{ z-index:5; }
  .piece.pop{ animation:pop .32s ease; }
  @keyframes pop{ 50%{ transform:scale(1.06);} }

  #win{
    position:fixed; inset:0; z-index:200; display:none;
    align-items:center; justify-content:center;
    background:rgba(40,20,70,.30); backdrop-filter:blur(3px);
  }
  #win.show{ display:flex; animation:fade .3s ease; }
  @keyframes fade{ from{opacity:0} to{opacity:1} }
  #win .card{
    background:#fff; border-radius:34px; padding:22px 26px 24px; text-align:center;
    box-shadow:0 24px 60px rgba(60,20,110,.35); border:5px solid #ffe6a8;
    max-width:88vw; max-height:90vh; overflow-y:auto;
    animation:bounce .5s cubic-bezier(.2,1.4,.5,1);
  }
  @keyframes bounce{ from{transform:scale(.6); opacity:0} to{transform:scale(1); opacity:1} }
  #win .big{ font-size:58px; font-weight:bold; line-height:1; margin-bottom:4px;
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  .animal{ width:min(48vw,190px); height:auto; aspect-ratio:1/1; border-radius:26px;
    display:block; margin:4px auto 8px; box-shadow:0 8px 18px rgba(60,30,90,.2);
    object-fit:cover; background:#f3e6df; }
  #win .cap{ font-size:21px; margin:0 0 16px; }
  #win .cap b{ font-weight:bold; }
  #win .btn{
    display:block; width:100%; font-family:inherit; font-size:21px; border:none; cursor:pointer;
    padding:13px 26px; border-radius:22px; color:#fff; margin:9px 0;
    box-shadow:0 10px 22px rgba(120,30,160,.32);
  }
  #win .btn:active{ transform:scale(.95); }
  #win .btn.replay{ background:#fff; color:#5b4a7a; border:3px solid #e6d6ff;
    box-shadow:0 6px 14px rgba(120,30,160,.14); font-size:18px; padding:11px 22px; }

  .confetti{ position:fixed; top:-20px; width:12px; height:16px; z-index:190; border-radius:3px; will-change:transform; }

  /* launch / logo screen */
  #boot{
    position:fixed; inset:0; z-index:500; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:6px; cursor:pointer;
    background:
      radial-gradient(circle at 50% 30%, #eaf4fb 0%, #cfe3f0 55%, #bcd6e6 100%);
    transition:opacity .5s ease;
  }
  #boot.hide{ opacity:0; pointer-events:none; }
  #boot .logo{
    width:min(56vw,230px); aspect-ratio:1/1; border-radius:30px; overflow:hidden;
    box-shadow:0 18px 40px rgba(40,70,110,.32); border:5px solid #fff;
    animation:logoIn .6s cubic-bezier(.2,1.4,.5,1) both, float 3.2s ease-in-out 1s infinite;
  }
  #boot .logo img{ width:100%; height:100%; object-fit:cover; display:block; }
  @keyframes logoIn{ from{transform:scale(.5); opacity:0} to{transform:scale(1); opacity:1} }
  @keyframes float{ 50%{ transform:translateY(-10px); } }
  #boot .boot-title{ margin-top:18px; font-size:32px; font-weight:bold; color:#2f4a63; }
  #boot .boot-sub{ font-size:17px; color:#5b7790; }
  #boot .boot-tap{ margin-top:18px; font-size:18px; color:#3a6488;
    background:#ffffffcc; padding:9px 20px; border-radius:18px; box-shadow:0 6px 16px rgba(40,70,110,.18);
    animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse{ 50%{ transform:scale(1.06); } }
</style>
</head>
<body>
  <div id="boot">
    <div class="logo"><img id="bootImg" alt="ABC Animals owl logo"></div>
    <div class="boot-title">ABC Animals</div>
    <div class="boot-sub">Learn letters &amp; animals</div>
    <div class="boot-tap">Tap to start</div>
  </div>
  <div id="stage"><div id="target"></div></div>

  <div id="hint">
    <span id="hintLetter"></span>
    <div class="txt">Build<br><b id="hintLabel">letter A</b></div>
  </div>

  <button id="reset">&#8635; Restart</button>

  <div id="win">
    <div class="card">
      <div class="big" id="winBig">A</div>
      <div id="winArt"></div>
      <div class="cap"><b id="capLetter">A</b> is for <b id="capAnimal">Alligator</b></div>
      <button class="btn replay" id="replay">&#128266; Hear it again</button>
      <button class="btn" id="again">Play again</button>
      <button class="btn" id="next">Next: B &#8594;</button>
    </div>
  </div>

  const LETTERS = {
    A:{ path:A_PATH, say:"ay",  animal:"Alligator", stops:[[0,"#1f3fd6"],[0.45,"#5b34c4"],[0.7,"#8a2bc4"],[1,"#c11fb8"]] },

    D:{ path:D_PATH, say:"dee", animal:"Dog",       stops:[[0,"#ffd86b"],[0.4,"#f4b733"],[0.7,"#ef9a2a"],[1,"#df7a16"]] }
  };
  const ORDER = ["A","B","C","D"];

  const stopsSVG = s => s.map(x=>'<stop offset="'+x[0]+'" stop-color="'+x[1]+'"/>').join('');
  const cssGrad  = s => 'linear-gradient(135deg,'+s.map(x=>x[1]+' '+(x[0]*100)+'%').join(',')+')';

  const stage=document.getElementById('stage'), target=document.getElementById('target'), winEl=document.getElementById('win');
  let current="A", scale,Wpx,Hpx,boardLeft,boardTop,SNAP, pieces=[];
  const drags=new Map();

  // ---- Sound ----
  let ac=null;
  function audio(){ if(!ac){ try{ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(ac&&ac.state==="suspended")ac.resume(); return ac; }
  function tone(f,t0,dur,type,vol){ const c=audio(); if(!c)return; const o=c.createOscillator(),g=c.createGain();
    o.type=type||"sine"; o.frequency.value=f; o.connect(g); g.connect(c.destination);
    const t=c.currentTime+t0; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol||0.2,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.02); }
  function tick(){ tone(660,0,0.09,"triangle",0.12); }
  function winChime(){ [523.25,659.25,783.99,1046.5].forEach((f,i)=>tone(f,i*0.12,0.45,"triangle",0.22)); }
  function speakWin(){ try{ if(!("speechSynthesis"in window))return; const ss=window.speechSynthesis; ss.cancel();
    const L=LETTERS[current];
    const u1=new SpeechSynthesisUtterance(L.say);    u1.lang="en-US"; u1.rate=0.5;  u1.pitch=1.05; // letter, drawn out
    const u2=new SpeechSynthesisUtterance(L.animal); u2.lang="en-US"; u2.rate=0.85; u2.pitch=1.05; // animal name
    ss.speak(u1); ss.speak(u2);
  }catch(e){} }

  function buildPiece(i){
    const L=LETTERS[current], r=REGIONS[i], el=document.createElement('div'); el.className='piece';
    el.innerHTML=
      '<svg viewBox="0 0 '+VB_W+' '+VB_H+'"><defs>'+
        '<linearGradient id="g'+i+'" gradientUnits="userSpaceOnUse" x1="60" y1="40" x2="340" y2="460">'+stopsSVG(L.stops)+'</linearGradient>'+
        '<clipPath id="c'+i+'"><rect x="'+r.x+'" y="'+r.y+'" width="'+r.w+'" height="'+r.h+'"/></clipPath>'+
      '</defs><g clip-path="url(#c'+i+')"><path fill="url(#g'+i+')" fill-rule="evenodd" d="'+L.path+'"/></g></svg>';
    stage.appendChild(el);
    const path=el.querySelector('path');
    const p={el,path,cx:(r.x+r.w/2),cy:(r.y+r.h/2),x:0,y:0,locked:false};
    path.addEventListener('pointerdown',e=>startDrag(e,p));
    return p;
  }
  function rebuildPieces(){ pieces.forEach(p=>p.el.remove()); pieces=[]; for(let i=0;i<5;i++) pieces.push(buildPiece(i)); }

  function layout(){
    const vw=innerWidth, vh=innerHeight;
    Hpx=Math.min(vh*0.5,(vw*0.62)/(VB_W/VB_H)); Wpx=Hpx*(VB_W/VB_H); scale=Hpx/VB_H;
    boardLeft=(vw-Wpx)/2; boardTop=(vh-Hpx)/2+Math.min(24,vh*0.03); SNAP=Math.max(42,Hpx*0.14);
    target.style.left=boardLeft+'px'; target.style.top=boardTop+'px';
    target.innerHTML='<svg width="'+Wpx+'" height="'+Hpx+'" viewBox="0 0 '+VB_W+' '+VB_H+'"><path d="'+LETTERS[current].path+'" fill="#cdbce6" fill-rule="evenodd"/></svg>';
    pieces.forEach(p=>{ const s=p.el.querySelector('svg'); s.setAttribute('width',Wpx); s.setAttribute('height',Hpx); });
  }
  function setPos(p,x,y){ p.x=x;p.y=y;p.el.style.transform='translate('+x+'px,'+y+'px)'; }
  function clampPiece(p){ const vw=innerWidth,vh=innerHeight,r=REGIONS[pieces.indexOf(p)],pad=4;
    const fx=p.x+r.x*scale,fy=p.y+r.y*scale,fw=r.w*scale,fh=r.h*scale; let nx=p.x,ny=p.y;
    if(fx<pad)nx+=(pad-fx); if(fx+fw>vw-pad)nx-=(fx+fw-(vw-pad)); if(fy<pad)ny+=(pad-fy); if(fy+fh>vh-pad)ny-=(fy+fh-(vh-pad)); setPos(p,nx,ny); }
  function scatter(){ const vw=innerWidth,vh=innerHeight;
    const slots=[[vw*0.80,vh*0.17],[vw*0.15,vh*0.42],[vw*0.86,vh*0.56],[vw*0.20,vh*0.83],[vw*0.78,vh*0.85],[vw*0.50,vh*0.90]];
    for(let i=slots.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[slots[i],slots[j]]=[slots[j],slots[i]];}
    pieces.forEach((p,i)=>{ p.locked=false;p.el.classList.remove('locked','pop');
      const [sx,sy]=slots[i]; setPos(p,(sx+Math.random()*40-20)-p.cx*scale,(sy+Math.random()*40-20)-p.cy*scale); clampPiece(p); }); }

  function startDrag(e,p){ if(p.locked)return; e.preventDefault(); audio();
    try{if("speechSynthesis"in window)speechSynthesis.resume();}catch(_){}
    p.el.classList.add('dragging'); try{p.path.setPointerCapture(e.pointerId);}catch(_){}
    drags.set(e.pointerId,{p,dx:e.clientX-p.x,dy:e.clientY-p.y}); }
  function moveDrag(e){ const d=drags.get(e.pointerId); if(!d)return; e.preventDefault(); setPos(d.p,e.clientX-d.dx,e.clientY-d.dy); }
  function endDrag(e){ const d=drags.get(e.pointerId); if(!d)return; drags.delete(e.pointerId);
    const p=d.p; p.el.classList.remove('dragging');
    if(Math.hypot(p.x-boardLeft,p.y-boardTop)<SNAP){ setPos(p,boardLeft,boardTop); p.locked=true; p.el.classList.add('locked');
      void p.el.offsetWidth; p.el.classList.add('pop'); tick(); checkWin(); }
    else clampPiece(p); }
  addEventListener('pointermove',moveDrag,{passive:false}); addEventListener('pointerup',endDrag); addEventListener('pointercancel',endDrag);

  function checkWin(){ if(pieces.every(p=>p.locked)){ winChime(); speakWin(); setTimeout(()=>{showWin();confetti();},650); } }
  function showWin(){
    const L=LETTERS[current];
    const big=document.getElementById('winBig'); big.textContent=current; big.style.backgroundImage=cssGrad(L.stops);
    document.getElementById('winArt').innerHTML=ART[L.animal];
    document.getElementById('capLetter').textContent=current;
    document.getElementById('capAnimal').textContent=L.animal;
    const nextL=ORDER[(ORDER.indexOf(current)+1)%ORDER.length];
    const nb=document.getElementById('next'); nb.innerHTML='Next: '+nextL+' &#8594;'; nb.style.backgroundImage=cssGrad(LETTERS[nextL].stops); nb.dataset.letter=nextL;
    document.getElementById('again').style.backgroundImage=cssGrad(L.stops);
    winEl.classList.add('show');
  }
  function confetti(){ const cols=['#1f3fd6','#5b34c4','#c11fb8','#36c46a','#11a6b8','#ff9a3d','#ffcf4d','#ff7eb6']; const vw=innerWidth;
    for(let i=0;i<90;i++){ const c=document.createElement('div'); c.className='confetti'; c.style.background=cols[(Math.random()*cols.length)|0];
      c.style.left=(Math.random()*vw)+'px'; const dur=1800+Math.random()*1600,drift=Math.random()*200-100,rot=Math.random()*720-360;
      document.body.appendChild(c);
      c.animate([{transform:'translate(0,-20px) rotate(0)',opacity:1},{transform:'translate('+drift+'px,'+(innerHeight+60)+'px) rotate('+rot+'deg)',opacity:1}],
        {duration:dur,easing:'cubic-bezier(.3,.6,.5,1)'}).onfinish=()=>c.remove(); } }

  function loadLetter(letter){
    current=LETTERS[letter]?letter:"A"; try{history.replaceState(null,"","#"+current);}catch(_){}
    const L=LETTERS[current];
    document.getElementById('hintLabel').textContent='letter '+current;
    document.getElementById('hintLetter').innerHTML=
      '<svg viewBox="0 0 '+VB_W+' '+VB_H+'"><defs><linearGradient id="gHint" gradientUnits="userSpaceOnUse" x1="60" y1="40" x2="340" y2="460">'+stopsSVG(L.stops)+'</linearGradient></defs>'+
      '<path fill="url(#gHint)" fill-rule="evenodd" d="'+L.path+'"/></svg>';
    rebuildPieces(); layout(); newGame();
  }
  function newGame(){ winEl.classList.remove('show'); drags.clear(); scatter(); }

  document.getElementById('reset').addEventListener('click',newGame);
  document.getElementById('again').addEventListener('click',newGame);
  document.getElementById('replay').addEventListener('click',function(){ audio(); speakWin(); });
